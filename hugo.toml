baseURL = 'https://mircoz-llc.github.io/weijianz/'
languageCode = 'en-us'
title = 'Weijian'
theme = 'blowfish'

[params]
  colorScheme = 'ocean'
  defaultAppearance = 'dark'
  autoSwitchAppearance = true
  enableSearch = true
  showScrollToTop = true

  [params.homepage]
    layout = 'profile'
    showRecent = true
    recentLimit = 5

  [params.author]
    name = 'Weijian'
    headline = 'Software Engineer'
    bio = 'Building things on the internet.'
    links = []

[outputs]
  home = ['HTML', 'RSS', 'JSON']
