baseURL = 'https://weijianz.com/'
languageCode = 'en-us'
title = 'Weijian Zhang'
theme = 'blowfish'
mainSections = ['posts', 'diary']

[params]
  colorScheme = 'neon'
  defaultAppearance = 'dark'
  autoSwitchAppearance = true
  enableSearch = true
  description = 'Architecting the Future of Cloud & AI'
  [params.footer]
    showScrollToTop = true

  [params.homepage]
    layout = 'hero'
    showRecent = true
    recentLimit = 5

  [params.author]
    image = "avatar_v2.png"
    name = 'Weijian Zhang'
    headline = 'Software Engineer @ AWS'
    bio = 'Building cloud infrastructure and Agentic AI solutions. ECS/Fargate, distributed systems, Java, Python.'
    links = [
      { linkedin = 'https://www.linkedin.com/in/weijianz/' },
      { github = 'https://github.com/weijianz-opc' },
      { email = 'mailto:zwj102030@gmail.com' }
    ]

[markup.goldmark.renderer]
  unsafe = true

[[menu.main]]
  name = 'Home'
  url = '/'
  weight = 10

[[menu.main]]
  name = 'Resume'
  url = '/about/'
  weight = 20

[[menu.main]]
  name = 'Posts'
  url = '/posts/'
  weight = 30

[[menu.main]]
  name = 'Diary'
  url = '/diary/'
  weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']
