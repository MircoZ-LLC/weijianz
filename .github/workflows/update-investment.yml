name: Update Investment Prices

on:
  schedule:
    - cron: '0 21 * * 1-5'   # 1pm PST weekdays
    - cron: '0 1  * * 2-6'   # 5pm PST weekdays
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch prices & update markdown
        run: python3 scripts/update_investment.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/investment/_index.md
          git diff --cached --quiet || git commit -m "chore: update investment prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
