name: Update Investment Prices

on:
  schedule:
    - cron: '0 21 * * 1-5'   # 1pm PST weekdays (21:00 UTC)
    - cron: '0 1  * * 2-6'   # 5pm PST weekdays (01:00 UTC next day)
  workflow_dispatch:           # allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch prices & update markdown
        run: |
          python3 << 'EOF'
          import subprocess, json
          from datetime import datetime
          import urllib.request

          TICKERS = ["TLT", "MSFT", "AMZN", "GOOG", "SNDK", "VOO"]

          def fetch_price(ticker):
              # Step 1: get cookie
              req = urllib.request.Request(
                  "https://fc.yahoo.com",
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor())
              opener.open(req)

              # Step 2: get crumb
              crumb_req = urllib.request.Request(
                  "https://query2.finance.yahoo.com/v1/test/getcrumb",
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              crumb = opener.open(crumb_req).read().decode()

              # Step 3: fetch quote
              url = f"https://query1.finance.yahoo.com/v7/finance/quote?symbols={ticker}&crumb={crumb}"
              quote_req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              data = json.loads(opener.open(quote_req).read())
              q = data["quoteResponse"]["result"][0]
              price = q["regularMarketPrice"]
              prev  = q.get("regularMarketPreviousClose", price)
              return price, (price - prev) / prev * 100

          rows = []
          for ticker in TICKERS:
              try:
                  price, chg = fetch_price(ticker)
                  arrow = "▲" if chg >= 0 else "▼"
                  color = "🟢" if chg >= 0 else "🔴"
                  rows.append(f"| {ticker} | ${price:,.2f} | {color} {arrow} {abs(chg):.2f}% | — |")
              except Exception as e:
                  rows.append(f"| {ticker} | N/A | — | — |")

          rows.append("| Pokémon TCG Cards | — | — | — |")

          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          content = f"""---
          title: "Investment"
          description: "Market notes, portfolio thoughts, and investment research"
          showDate: false
          showReadingTime: false
          ---

          ## Current Holdings

          | Ticker / Asset | Price | Day Change | % of Portfolio |
          |----------------|-------|------------|---------------|
          {chr(10).join(rows)}

          *Last updated: {now} · Auto-refreshed by GitHub Actions*
          """
          # de-indent
          import textwrap
          content = textwrap.dedent(content)

          with open("content/investment/_index.md", "w") as f:
              f.write(content)

          print("Updated investment page")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/investment/_index.md
          git diff --cached --quiet || git commit -m "chore: update investment prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
